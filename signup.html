<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inscription — Nancy Store</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body class="auth-page">

<header class="header" id="header">
  <div class="header-inner">
    <a href="index.html" class="logo">Nancy <span>Store</span></a>
    <nav class="nav" id="nav">
      <a href="index.html"            class="nav-link" data-fr="Accueil"     data-en="Home">Accueil</a>
      <a href="index.html#collections" class="nav-link" data-fr="Collections" data-en="Collections">Collections</a>
      <a href="contact.html"          class="nav-link" data-fr="Contact"     data-en="Contact">Contact</a>
    </nav>
    <div class="header-actions">
      <div class="lang-switch">
        <button class="lang-btn" data-lang="fr">FR</button>
        <span class="lang-sep">|</span>
        <button class="lang-btn" data-lang="en">EN</button>
      </div>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <span class="icon-sun">☀</span>
        <span class="icon-moon">☽</span>
      </button>
      <button class="hamburger" id="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</header>

<main class="auth-main">
  <div class="auth-deco">
    <div class="auth-deco-shape s1"></div>
    <div class="auth-deco-shape s2"></div>
    <div class="auth-deco-text">Nancy Store</div>
  </div>

  <div class="auth-card">
    <div class="auth-card-header">
      <p class="auth-eyebrow" data-fr="Bienvenue"  data-en="Welcome">Bienvenue</p>
      <h1 class="auth-title">
        <span data-fr="Créez votre" data-en="Create Your">Créez votre</span><br/>
        <em data-fr="Compte" data-en="Account">Compte</em>
      </h1>
      <p class="auth-subtitle"
         data-fr="Rejoignez des milliers de clients et accédez à des offres exclusives."
         data-en="Join thousands of style-forward shoppers and unlock exclusive offers.">
        Rejoignez des milliers de clients et accédez à des offres exclusives.
      </p>
    </div>

    <form class="auth-form" onsubmit="handleSignup(event)">
      <div class="form-group">
        <label class="form-label" for="fullname" data-fr="Nom complet" data-en="Full Name">Nom complet</label>
        <input class="form-input" id="fullname" type="text"
               data-placeholder-fr="Jean Dupont"
               data-placeholder-en="Jane Doe"
               placeholder="Jean Dupont"
               required autocomplete="name"/>
      </div>
      <div class="form-group">
        <label class="form-label" for="email" data-fr="Adresse e-mail" data-en="Email Address">Adresse e-mail</label>
        <input class="form-input" id="email" type="email"
               data-placeholder-fr="jean@email.com"
               data-placeholder-en="jane@email.com"
               placeholder="jean@email.com"
               required autocomplete="email"/>
      </div>
      <div class="form-group">
        <label class="form-label" for="password" data-fr="Mot de passe" data-en="Password">Mot de passe</label>
        <div class="input-wrapper">
          <input class="form-input" id="password" type="password"
                 data-placeholder-fr="Min. 8 caractères"
                 data-placeholder-en="Min. 8 characters"
                 placeholder="Min. 8 caractères"
                 required/>
          <button type="button" class="toggle-pass" onclick="togglePassword()" aria-label="Afficher le mot de passe">👁</button>
        </div>
      </div>
      <div class="form-group form-check">
        <input type="checkbox" id="terms" required/>
        <label for="terms">
          <span data-fr="J'accepte les" data-en="I agree to the">J'accepte les</span>
          <a href="#" data-fr="Conditions d'utilisation" data-en="Terms of Service">Conditions d'utilisation</a>
          <span data-fr="et la" data-en="and">et la</span>
          <a href="#" data-fr="Politique de confidentialité" data-en="Privacy Policy">Politique de confidentialité</a>
        </label>
      </div>
      <button type="submit" class="btn-primary btn-full"
              data-fr="Créer mon compte" data-en="Create Account">Créer mon compte</button>
    </form>

    <p class="auth-switch">
      <span data-fr="Déjà un compte ?" data-en="Already have an account?">Déjà un compte ?</span>
      <a href="#" data-fr="Se connecter" data-en="Sign In">Se connecter</a>
    </p>

    <div class="auth-divider">
      <span data-fr="ou continuer avec" data-en="or sign up with">ou continuer avec</span>
    </div>
    <div class="social-auth">
      <button class="social-btn">G Google</button>
      <button class="social-btn">f Facebook</button>
    </div>
  </div>
</main>

<footer class="footer-mini">
  <p>
    © 2025 Nancy Store ·
    <a href="#" data-fr="Confidentialité" data-en="Privacy">Confidentialité</a> ·
    <a href="#" data-fr="Conditions"      data-en="Terms">Conditions</a>
  </p>
</footer>

<script src="script.js"></script>
</body>
</html>
